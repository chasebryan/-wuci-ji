name: daylight-cplus

on:
  push:
    branches:
      - main
      - wuci-kaiju-non-graphical-boot
  pull_request:

permissions:
  contents: read

jobs:
  daylight-cplus:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show toolchain
        run: |
          python3 --version

      - name: Daylight v14C+ package tests
        run: PYTHONPATH=daylight/v14c-plus python3 -m unittest discover -s daylight/v14c-plus/tests -t daylight/v14c-plus

      - name: Fixture score recomputation
        run: make daylight-cplus-verify
