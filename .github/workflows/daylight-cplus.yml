name: daylight-cplus

on:
  push:
    branches:
      - main
      - wuci-kaiju-non-graphical-boot
  pull_request:

permissions:
  contents: read

jobs:
  daylight-cplus:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Show toolchain
        run: |
          python3 --version

      - name: Daylight v14C+ package tests
        run: PYTHONPATH=daylight/v14c-plus python3 -m unittest discover -s daylight/v14c-plus/tests -t daylight/v14c-plus

      - name: Fixture score recomputation
        run: make daylight-cplus-verify
