name: daylight-v20-aperture-singularity

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  daylight-v20-aperture-singularity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5
        with:
          python-version: "3.12"

      - name: Show toolchain
        run: python3 --version

      - name: Daylight v20 Aperture Singularity CI
        run: make daylight-v20-aperture-singularity-ci

      - name: Daylight v19 Aperture Bastion CI
        run: make daylight-v19-aperture-bastion-ci

      - name: Daylight v17 Event Horizon tests
        run: make daylight-v17-event-horizon-test

      - name: Public artifact firewall
        run: make daylight-public-artifact-firewall
