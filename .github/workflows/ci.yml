name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          uname -a
          as --version | head -n 1
          ld --version | head -n 1
          python3 --version

      - name: Build and test
        run: make clean && make test

  zig-linux-x86_64:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Show toolchain
        run: |
          uname -a
          zig version
          file --version | head -n 1
          python3 --version

      - name: Build Zig ELF and run release proof
        run: |
          make clean
          make build-linux
          file build/wuci-ji-linux-x86_64
          ./build/wuci-ji-linux-x86_64 selftest
          make zig-release-proof
