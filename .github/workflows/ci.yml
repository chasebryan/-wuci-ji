name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Show toolchain
        run: |
          uname -a
          as --version | head -n 1
          ld --version | head -n 1
          zig version
          python3 --version

      - name: Build and test
        run: make clean && make test

      - name: Record reproducible build metadata
        run: make reproducible-build-metadata

      - name: Run parser and artifact boundary tests
        run: |
          make parser-adversarial-test
          make aead-boundary-test
          make secret-path-isolation-test

      - name: Run install regression
        run: make install-test

      - name: Run high-attestation metadata gates
        run: |
          make high-attestation-profile
          make pq-verifier-test
          make production-readiness-gates
          make crypto-self-audit-test

      - name: Run DaylightNPT number precision gate
        run: make daylight-npt-ci

      - name: Run offline live-integrity and repository-maintenance gates
        run: make live-integrity-test repository-maintenance-test

      - name: Run assembly self-release contract proof
        run: make self-release-asm-contract-proof

      - name: Run anchored self-release proof
        run: make self-release-anchored-proof

      - name: Run assembly release contract proof
        run: make self-release-release-contract-proof

      - name: Run rooted publish bundle proof
        run: make self-release-publish-bundle

      - name: Run public witness bundle proof
        run: make self-release-witness-bundle

      - name: Run witness regression
        run: make witness-attestation-test

      - name: Run witness archive proof
        run: make self-release-witness-archive

      - name: Run witness archive regression
        run: make witness-archive-test

  zig-linux-x86_64:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Show toolchain
        run: |
          uname -a
          zig version
          file --version | head -n 1
          python3 --version

      - name: Run DaylightNPT number precision gate
        run: make daylight-npt-ci

      - name: Build Zig ELF and run Gate/release proofs
        run: |
          make clean
          make build-linux
          file build/wuci-ji-linux-x86_64
          ./build/wuci-ji-linux-x86_64 selftest
          make gate-contract-zig
          make zig-release-proof
          make zig-release-contract-proof
          make zig-release-asm-contract-proof
          make zig-release-anchored-proof
          make zig-release-release-contract-proof
          make zig-release-publish-bundle
          make zig-release-witness-bundle
          make witness-zig RELEASE_BIN=$(pwd)/build/wuci-ji-linux-x86_64 WITNESS_BUNDLE_DIR=build/wuci-zig-release-witness-bundle
          make witness-zig-test RELEASE_BIN=$(pwd)/build/wuci-ji-linux-x86_64 WITNESS_BUNDLE_DIR=build/wuci-zig-release-witness-bundle
          make zig-release-witness-archive
          make witness-archive-zig-test RELEASE_BIN=$(pwd)/build/wuci-ji-linux-x86_64 WITNESS_BUNDLE_DIR=build/wuci-zig-release-witness-bundle
