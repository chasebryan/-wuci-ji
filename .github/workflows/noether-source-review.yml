name: noether-source-review

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: noether-source-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-only-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
        with:
          python-version: "3.12"

      - name: Reject Noether binary distribution
        run: make wucios-noether-forge-source-guard

      - name: Test Noether source pipeline
        run: make wucios-noether-forge-test

      - name: Validate WuciOS structure
        run: make wucios-validate
