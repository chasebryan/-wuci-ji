name: Daylight Standard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  daylight-standard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Daylight standard gate
        uses: ./.github/actions/daylight-standard
      - name: Stage conformance artifacts
        run: |
          mkdir -p build/daylight/daylight-standard-public
          cp build/daylight/product-standard-readiness.json build/daylight/daylight-standard-public/
          cp build/daylight/daylight-standard-scorecard.json build/daylight/daylight-standard-public/
          cp build/daylight/daylight-standard-control-map.json build/daylight/daylight-standard-public/
      - name: Public evidence firewall
        run: python3 tools/daylight_public_evidence_firewall.py scan build/daylight/daylight-standard-public --profile public-docs
      - name: Upload conformance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daylight-standard
          path: build/daylight/daylight-standard-public/
          if-no-files-found: error
