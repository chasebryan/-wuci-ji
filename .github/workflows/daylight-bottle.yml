name: daylight-bottle

on:
  push:
    branches:
      - main
    paths:
      - "apps/bottle/**"
      - ".github/workflows/daylight-bottle.yml"
  pull_request:
    paths:
      - "apps/bottle/**"
      - ".github/workflows/daylight-bottle.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daylight-bottle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/bottle
    env:
      NODE_VERSION: 22.23.1
      NPM_VERSION: 11.8.0

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/bottle/package-lock.json

      - name: Pin npm
        run: npm install --global npm@${NPM_VERSION}

      - name: Show toolchain
        run: |
          node --version
          npm --version

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Verify same-origin production bundle
        run: npm run verify:bundle

      - name: Verify clean release source binding
        run: npm run validate:release-source

      - name: Dry-run Worker and static-assets deployment
        run: npm run wrangler:dry-run

      - name: Public evidence firewall
        run: |
          python3 ../../tools/daylight_public_evidence_firewall.py scan dist
          python3 ../../tools/daylight_public_evidence_firewall.py scan .wrangler/dry-run

      - name: Retain validated static and Worker dry-run bundles
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: daylight-bottle-validated-release-${{ github.sha }}
          path: |
            apps/bottle/dist/
            apps/bottle/.wrangler/dry-run/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30
